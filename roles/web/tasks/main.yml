---
  - name: Create directory
    file:
      path: web/
      state: directory
  - name: Create config dirs
    file:
      path: "{{ docker.paths.configs }}{{ item }}"
      state: directory
    loop: "{{ web_containers }}"
  - name: Create work dirs
    file:
      path: "{{ docker.paths.work }}{{ item }}"
      state: directory
    loop: "{{ web_containers }}"
  - name: Create log dirs
    file:
      path: "{{ docker.paths.logs }}{{ item }}"
      state: directory
    loop: "{{ web_containers }}"
  - name: Create data dirs
    file:
      path: "{{ docker.paths.data }}{{ item }}"
      state: directory
    loop: "{{ web_containers }}"
  - name: Run web container specific tasks
    include_tasks: "{{ container_name }}.yml"
    loop: "{{ web_containers }}"
    loop_control:
      loop_var: container_name
  - name: Write docker compose file
    template:
      src: docker-compose_yml.j2
      dest: "{{ docker_base_path }}/docker-compose.yml"
      mode: 0644
      backup: yes
  - name: Create restart script
    template:
      src: start_sh.j2.sh
      dest: "{{ docker_base_path }}/start.sh"
      mode: 0755
      backup: yes
  - name: Add cronjob to restart docker if neccessary
    cron:
      name: "check docker containers"
      minute: "*/5"
      user: "{{ ansible_user }}"
      backup: yes
      job: "{{ docker_base_path }}/start.sh >> {{ docker.paths.logs }}start.log 2>&1"
  - name: Create backup file
    template:
      src: backup_databases.j2.sh
      dest: "{{ docker_base_path }}/backup_databases.sh"
      mode: 0755
      backup: yes
  - name: Create restore script
    template:
      src: restore_grafana.j2.sh
      dest: "{{ docker_base_path }}/restore_grafana.sh"
      mode: 0755
      backup: yes
  - name: Add cronjob for backup job
    cron:
      name: "backup databases"
      minute: "0"
      hour: "23"
      user: "{{ ansible_user }}"
      backup: yes
      job: "{{ docker_base_path }}/backup_databases.sh >> {{ docker.paths.logs }}backup.log 2>&1"
  - name: Create node_exporter textfile collector directory
    file:
      path: "{{ docker.paths.data }}node-exporter"
      state: directory
      mode: '0755'
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"
  - name: Install logrotate config for docker container logs
    template:
      src: logrotate_docker.j2
      dest: /etc/logrotate.d/docker-containers
      mode: 0644
      owner: root
      group: root
    become: yes
  - name: Run docker-compose
    block:
      - name: Find docker compose files
        find:
          paths: "{{ docker_base_path }}"
          patterns: 'docker-compose*.yml'
          recurse: no
        register: compose_files
      - community.docker.docker_compose_v2:
          project_src: "{{ docker_base_path }}"
          state: present
          recreate: "{{ 'always' if restart_container else 'never' }}"
          files: "{{ compose_files.files | map(attribute='path') | list }}"
          remove_orphans: true
        register: compose_output
      - debug:
          var: compose_output
