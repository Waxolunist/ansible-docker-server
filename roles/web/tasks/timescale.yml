---
  - name: Timescale - Change permissions for work dir
    file:
      path: "{{ docker.paths.data }}timescale"
      mode: '0755'
  - name: Timescale - Change permissions for logs dir
    file:
      path: "{{ docker.paths.logs }}timescale"
      mode: '0755'
  - name: Timescale - Check if pgdata exists
    stat: 
      path: "{{ docker.paths.data }}timescale/pgdata"
    register: timescale_pgdata_dir
  - name: Timescale - Create pgdata
    file:
      path: "{{ docker.paths.data }}timescale/pgdata"
      state: directory
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"
    when: timescale_pgdata_dir.stat.exists == False
  - name: Timescale - Create secrets directory
    file:
      path: "{{ docker_base_path }}/secrets"
      state: directory
      mode: '0700'
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"
  - name: Timescale - Write superuser password secret
    copy:
      content: "{{ vault_timescale_pg_password }}"
      dest: "{{ docker_base_path }}/secrets/timescale_superuser_password"
      mode: '0600'
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"
  - name: Timescale - Write role init SQL
    template:
      src: timescale/init_roles_sql.j2
      dest: "{{ docker.paths.configs }}timescale/init_roles.sql"
      mode: '0600'
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"