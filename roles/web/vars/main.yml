---
  web_containers:
    - traefik
    - prometheus
    - registry
    - authelia
    - grafana
    - pgadmin
    - minecraft
    - timescale
    - photoprism
    - loki
    - promtail
    - postgres_exporter
    - conduit
    - picoclaw
    - code-server
  conduit:
    domain: "matrix.{{ topleveldomain }}"
    port: 6167
  registry:
    domain: "registry.{{ topleveldomain }}"
    port: 5000
  prometheus:
    domain: "metrics.{{ topleveldomain }}"
  authelia:
    domain: "auth.{{ topleveldomain }}"
    port: 9091
  traefik:
    domain: "proxy.{{ topleveldomain }}"
  grafana:
    domain: "graph.{{ topleveldomain }}"
  pgadmin:
    domain: "pgadmin.{{ topleveldomain }}"
    port: 5050
  minecraft:
    port: 25565
  cadvisor:
    domain: "cadvisor.{{ topleveldomain }}"
  photoprism:
    domain: "photos.{{ topleveldomain }}"
  redirect:
    domains:
      - "me.{{ topleveldomain }}"
      - "christian.sterzl.info"
    target: "https://www.linkedin.com/in/christian-sterzl-59b282182/"

  picoclaw:
    domain: "picoclaw.{{ topleveldomain }}"
    port: 18800

  picoclaw_gw:
    domain: "picoclaw-gw.{{ topleveldomain }}"
    port: 18790

  code_server:
    domain: "code.{{ topleveldomain }}"
    port: 8443

  android_sdk:
    cmdline_tools_version: "11076708"
    packages:
      - "platform-tools"
      - "platforms;android-35"
      - "platforms;android-36"
      - "build-tools;36.0.0"

  expo:
    domain: "expo.{{ topleveldomain }}"
    port: 8081

  restart_container: no