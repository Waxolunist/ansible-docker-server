---
- name: Initialize system
  block:
    - name: Add a new user named devops
      user:
        name: devops
        shell: /bin/bash
        password: "{{ vault_devops_pass | password_hash('sha512') }}"
    
    - name: Add devops user to the sudoers
      copy:
        dest: "/etc/sudoers.d/devops"
        content: "devops  ALL=(ALL)  NOPASSWD: ALL"

    - name: Deploy SSH Key
      ansible.posix.authorized_key:
        user: devops
        key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"
        state: present
    
    - name: Set locales
      locale_gen:
        name: en_US.UTF-8
        state: present

- name: Disable Password Authentication
  block:
    - name: Disable Password Authentication ssh service
      lineinfile:
        dest=/etc/ssh/sshd_config
        regexp='^PasswordAuthentication'
        line="PasswordAuthentication no"
        state=present
        backup=yes

    - name: Disable Root Login
      lineinfile:
        dest=/etc/ssh/sshd_config
        regexp='^PermitRootLogin'
        line="PermitRootLogin no"
        state=present
        backup=yes
      notify:
        - restart ssh
  when: disable_ssh_passwordauthentication

- name: Enable cgroups v2 unified hierarchy
  block:
    - name: Ensure systemd.unified_cgroup_hierarchy=1 in GRUB
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
        line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet systemd.unified_cgroup_hierarchy=1"'
        backup: yes
      register: grub_config

    - name: Update GRUB
      ansible.builtin.command: update-grub
      when: grub_config.changed

    - name: Reboot to apply cgroups v2
      ansible.builtin.reboot:
        msg: "Rebooting to enable cgroups v2"
        reboot_timeout: 300
      when: grub_config.changed